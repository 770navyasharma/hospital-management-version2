{% extends "base.html" %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}

{% block page_content %}
<div class="auth-container">
    <div class="auth-card">
        
        <div class="auth-image-side register-bg"> 
            <img src="{{ url_for('static', filename='images/undraw_secure-login_m11a.svg') }}" 
                 alt="Register Graphic" 
                 style="object-fit: contain;">
            <div class="welcome-text">
                Create Your Account
            </div>
        </div>

        <div class="auth-form-side">
            <h2>Patient Registration</h2>
            <p class="text-muted">Create an account to book appointments.</p>
            
            <form action="{{ url_for('main.patient_register') }}" method="POST" enctype="multipart/form-data">
                
                <div class="mb-3 text-center">
                    <img src="{{ url_for('static', filename='images/default-profile.svg') }}" id="pic-preview" class="auth-img-preview mb-3" alt="Profile Preview">
                    <div>
                        <label for="profile_pic" class="form-label">Profile Picture (Optional)</label>
                        <input class="form-control form-control-sm" type="file" id="profile_pic_input" name="profile_pic" accept="image/*">
                    </div>
                </div>

                <div class="mb-3">
                    <label for="full_name" class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="full_name" name="full_name" required>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="contact_number" class="form-label">Contact Number</label>
                        <input type="tel" class="form-control" id="contact_number" name="contact_number" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="date_of_birth" class="form-label">Date of Birth</label>
                        <input type="date" class="form-control" id="date_of_birth" name="date_of_birth" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="gender" class="form-label">Gender</label>
                        <select class="form-select" id="gender" name="gender" required>
                            <option value="" disabled selected>Select...</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                {% if error %}
                <div class="alert alert-danger" role="alert">
                    {{ error }}
                </div>
                {% endif %}
                
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-auth">Create Account</button>
                </div>
            </form>

            <div class="auth-switch-link">
                Already have an account? <a href="{{ url_for('security.login') }}">Login here</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/auth_preview.js') }}"></script>
{% endblock %}
