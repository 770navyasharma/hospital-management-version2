<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Hospital Management System{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    {% block styles %}{% endblock %}
</head>
<body>

    {% block navbar %}
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('main.index') }}">
                <i class="bi bi-hospital"></i> HMS v2
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    {% if current_user.is_authenticated %}
                        <li class="nav-item">
                            <a class="nav-link" href="{{ url_for('main.dashboard') }}">Dashboard</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{{ url_for('security.logout') }}">Logout</a>
                        </li>
                    {% else %}
                        <li class="nav-item me-2"> 
                            <a class="nav-link" href="{{ url_for('security.login') }}">Login</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link btn btn-primary text-white px-3" href="{{ url_for('main.patient_register') }}">Register</a>
                        </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>
    {% endblock navbar %}

    {% block page_content %}{% endblock %}

    
    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 11000;">
        <div id="globalToast" class="toast align-items-center border-0 rounded-4 shadow-lg overflow-hidden" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body d-flex align-items-center gap-3 py-3 px-4">
                    <div id="toastIcon" class="fs-4"></div>
                    <div>
                        <div id="toastTitle" class="fw-black smallest text-uppercase ls-1 mb-1">Notification</div>
                        <div id="toastMessage" class="small fw-bold"></div>
                    </div>
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    
    {% block scripts %}{% endblock %}

    <script>
        
        window.showToast = function(message, type = 'primary', title = 'Notification') {
            const toastEl = document.getElementById('globalToast');
            const toastBody = document.getElementById('toastMessage');
            const toastTitle = document.getElementById('toastTitle');
            const toastIcon = document.getElementById('toastIcon');
            
            toastBody.innerText = message;
            toastTitle.innerText = title;
            
            
            toastEl.className = `toast align-items-center border-0 rounded-4 shadow-lg overflow-hidden bg-${type} text-white`;
            
            const icons = {
                'success': '<i class="bi bi-check-circle-fill"></i>',
                'danger': '<i class="bi bi-exclamation-octagon-fill"></i>',
                'warning': '<i class="bi bi-exclamation-triangle-fill"></i>',
                'info': '<i class="bi bi-info-circle-fill"></i>',
                'primary': '<i class="bi bi-bell-fill"></i>'
            };
            toastIcon.innerHTML = icons[type] || icons['primary'];

            const toast = new bootstrap.Toast(toastEl, { delay: 6000 });
            toast.show();
        };

        
        document.addEventListener('DOMContentLoaded', () => {
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        window.showToast("{{ message }}", "{{ 'success' if category == 'success' else 'danger' if category == 'danger' else 'primary' }}", "{{ category.upper() }}");
                    {% endfor %}
                {% endif %}
            {% endwith %}
        });
    </script>
</body>
</html>
